<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Подтверждение входа — Libermall ID</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml"><meta name="theme-color" content="#0A0A0C">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<nav class="nav"><div class="container nav-inner"><a href="/" class="nav-logo"><img src="/assets/logo.svg" alt="Libermall ID" height="36"></a></div></nav>

<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo"><img src="/favicon.svg" alt="" width="48" height="48"></div>
    <h1>Подтвердите вход</h1>
    <p class="sub">Мы отправили 6-значный код в <a href="https://t.me/LibermallIDbot" style="color:var(--primary);">@LibermallIDbot</a>. Откройте бот и подтвердите запрос.</p>

    <div class="code-digits">
      <input class="code-digit" maxlength="1" inputmode="numeric" autofocus>
      <input class="code-digit" maxlength="1" inputmode="numeric">
      <input class="code-digit" maxlength="1" inputmode="numeric">
      <input class="code-digit" maxlength="1" inputmode="numeric">
      <input class="code-digit" maxlength="1" inputmode="numeric">
      <input class="code-digit" maxlength="1" inputmode="numeric">
    </div>

    <div class="timer" id="timer">Код действителен <b style="color:var(--text-soft);">4:58</b></div>

    <div class="auth-actions" style="flex-direction:column;gap:8px;">
      <a href="/dashboard.html" class="btn btn-primary btn-block">Подтвердить</a>
      <a href="/login.html" class="btn btn-secondary btn-block">Это не я · отменить</a>
    </div>

    <div class="security-tip">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>Никогда не сообщайте этот код посторонним. Libermall ID не запрашивает код в чатах или по почте.</span>
    </div>
  </div>
</div>

<style>
  .code-digit { width: 44px; height: 56px; text-align: center; font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; background: var(--bg-elev-3); border: 1px solid var(--border); border-radius: 10px; color: var(--primary); transition: all .15s; }
  .code-digit:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,214,10,0.15); }
</style>

<script>
// Auto-advance between digits
const digits = document.querySelectorAll('.code-digit');
digits.forEach((el, i) => {
  el.addEventListener('input', () => {
    if (el.value && i < digits.length - 1) digits[i + 1].focus();
  });
  el.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !el.value && i > 0) digits[i - 1].focus();
  });
});

// Countdown timer 5 min
let s = 5 * 60;
const timer = document.querySelector('#timer b');
const tick = setInterval(() => {
  s--;
  if (s <= 0) { clearInterval(tick); timer.parentElement.innerHTML = 'Код истёк. <a href="/login.html" style="color:var(--primary);">Запросить новый</a>'; return; }
  timer.textContent = Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}, 1000);
</script>

</body>
</html>
