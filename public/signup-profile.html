<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль — Libermall ID</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<meta name="theme-color" content="#0A0A0C">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
<meta property="og:title" content="Профиль — Libermall ID">
<meta property="og:description" content="Libermall ID — единая идентификация для всей экосистемы Libermall.">
<meta property="og:url" content="https://id.libermall.com/signup-profile.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Libermall ID">
<meta property="og:image" content="https://id.libermall.com/assets/og-cover.svg">
<meta property="og:locale" content="ru_RU">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Профиль — Libermall ID">
<meta name="twitter:description" content="Libermall ID — единая идентификация для всей экосистемы Libermall.">
<meta name="twitter:image" content="https://id.libermall.com/assets/og-cover.svg">
</head>
<body>

<nav class="nav">
  <div class="container nav-inner">
    <a href="/" class="nav-logo"><img src="/assets/logo.svg" alt="Libermall ID" height="36"></a>
    <div class="nav-actions"><a href="/login.html" class="btn btn-ghost">Войти</a></div>
  </div>
</nav>

<div class="auth-shell">
  <div class="auth-card">
    <div class="steps-bar">
      <div class="step-dot done">✓</div>
      <div class="seg active"></div>
      <div class="step-dot done">✓</div>
      <div class="seg active"></div>
      <div class="step-dot active">3</div>
    </div>

    <h1>Завершите профиль</h1>
    <p class="sub">Добавьте аватар и имя</p>

    <div class="avatar-pick">
      <div class="av-circle">+</div>
      <div class="av-hint">Кликните чтобы загрузить</div>
    </div>

    <div class="field">
      <label>Display name</label>
      <input type="text" placeholder="Libermall User" autofocus required>
    </div>

    <div class="auth-actions">
      <a href="/signup-username.html" class="btn btn-secondary">Назад</a>
      <a href="/dashboard.html" class="btn btn-primary btn-block">Создать аккаунт →</a>
    </div>

    <p class="agree" style="margin-top:14px;">Заполнить позже — <a href="/dashboard.html">пропустить</a></p>
  </div>
</div>

</body>
</html>
