map $request_uri $is_marketing_page {
    default                              0;
    "~^/$"                               1;
    "~^/index\.html$"                    1;
    "~^/products\.html$"                 1;
    "~^/developers\.html$"               1;
    "~^/integrate\.html$"                1;
    "~^/about\.html$"                    1;
    "~^/privacy\.html$"                  1;
    "~^/terms\.html$"                    1;
    "~^/sitemap\.xml$"                   1;
    "~^/robots\.txt$"                    1;
    "~^/favicon\.(svg|ico|png)$"         1;
    "~^/assets/"                         1;
}

server {
    listen 443 ssl http2;
    server_name id.libermall.com;
    ssl_certificate     /etc/letsencrypt/live/id.libermall.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/id.libermall.com/privkey.pem;

    root /var/www/libermall-id-landing;
    index index.html;

    # Marketing-страницы из статики
    location = / {
        try_files /index.html =404;
        add_header Cache-Control "public, max-age=300";
    }
    location ~ ^/(index\.html|products\.html|developers\.html|integrate\.html|about\.html|privacy\.html|terms\.html|sitemap\.xml|robots\.txt|favicon\..*)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=300";
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # Всё остальное — Casdoor backend (auth flow, API, SPA, .well-known)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 90s;
    }
}

server {
    listen 80;
    server_name id.libermall.com;
    return 301 https://$host$request_uri;
}
